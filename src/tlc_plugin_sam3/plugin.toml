# 3LC Compute plugin manifest — the single source of truth for this plugin's metadata.
id = "sam3"
name = "SAM3"
description = "Auto-label images with SAM3 — preview results, create tables, and run predictions with text prompts."
version = "0.1.1"
min_service_version = "0.1.0"
icon = "△"
icon_svg = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8a6 6 0 1 1 12 0"/><path d="M5 8a3 3 0 1 1 6 0"/><circle cx="8" cy="8" r="1" fill="currentColor" stroke="none"/></svg>'

[ui]
display_mode = "sidebar"
section = "AI Tools"
compatible_with = ["table"]
input_types = ["table"]
output_types = ["run"]
min_input_count = 0
quick_action = true
quick_action_label = "Auto-Label with SAM3"
quick_action_description = "Use SAM3 to detect and segment objects by text prompt"

[runtime]
isolation = "venv"
entrypoint = "tlc_plugin_sam3:SAM3Plugin"
# Heavy stack lives behind this extra of the providing distribution; the host
# installs it ONLY into this plugin's provisioned venv, never the host venv.
provision_extra = "sam3"
requires_gpu = true
